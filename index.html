<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aqualogica PDPs</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Sora',sans-serif;
    background:#d9d6cd;
    min-height:100vh;
    overflow-x:auto;
  }
  .pair{
    display:flex;
    gap:40px;
    align-items:flex-start;
    justify-content:flex-start;
    padding:28px 40px 40px;
    min-width:min-content;
  }
  .col{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    flex:none;
  }
  .label{
    font-family:'Sora',sans-serif;
    font-weight:700;
    font-size:15px;
    color:#14202c;
    background:#fff;
    border-radius:999px;
    padding:8px 24px;
    box-shadow:0 6px 18px rgba(0,0,0,.08);
    white-space:nowrap;
  }
  iframe{
    width:390px;
    height:860px;
    border:0;
    border-radius:18px;
    box-shadow:0 6px 18px rgba(0,0,0,.08);
    display:block;
    background:#fff;
  }
</style>
</head>
<body>
  <div class="pair">
    <div class="col">
      <div class="label">Sunscreen</div>
      <iframe src="Aqualogica%20Standalone%20PDPs/Aqualogica%20Sunscreen%20PDP.html" title="Sunscreen PDP"></iframe>
    </div>
    <div class="col">
      <div class="label">Fragrance</div>
      <iframe src="Aqualogica%20Standalone%20PDPs/Aqualogica%20Fragrance%20PDP.html" title="Fragrance PDP"></iframe>
    </div>
    <div class="col">
      <div class="label">Combo Gift Set</div>
      <iframe src="Aqualogica%20Standalone%20PDPs/Aqualogica%20Combo%20Gift%20Set%20PDP.html" title="Combo Gift Set PDP"></iframe>
    </div>
  </div>
</body>
</html>
