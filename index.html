<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aqualogica PDPs</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--teal:#2A6FDB;--ink:#14202c;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;min-height:100%;}
  body{
    font-family:'Sora',sans-serif;
    background:#d9d6cd;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .tabs{
    position:sticky;
    top:0;
    z-index:5;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    justify-content:center;
    padding:22px 16px 18px;
    background:rgba(217,214,205,.92);
    backdrop-filter:blur(8px);
    width:100%;
  }
  .tab{
    font-family:'Sora',sans-serif;
    font-weight:700;
    font-size:15px;
    color:var(--ink);
    background:#fff;
    border:0;
    border-radius:999px;
    padding:10px 26px;
    cursor:pointer;
    box-shadow:0 6px 18px rgba(0,0,0,.08);
    transition:transform .12s ease, background .12s ease, color .12s ease;
    white-space:nowrap;
  }
  .tab:hover{transform:translateY(-1px);}
  .tab[aria-selected="true"]{
    background:var(--teal);
    color:#fff;
    box-shadow:0 8px 22px rgba(42,111,219,.35);
  }
  .stage{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:8px 16px 40px;
    width:100%;
  }
  .variants{
    display:none;
    gap:8px;
    margin-bottom:12px;
  }
  .variants.show{display:flex;}
  .vbtn{
    font-family:'Sora',sans-serif;
    font-weight:600;
    font-size:13px;
    color:var(--ink);
    background:#fff;
    border:0;
    border-radius:999px;
    padding:7px 18px;
    cursor:pointer;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    transition:transform .12s ease, background .12s ease, color .12s ease;
  }
  .vbtn[aria-selected="true"]{
    background:var(--ink);
    color:#fff;
  }
  iframe{
    width:390px;
    height:860px;
    max-width:100%;
    border:0;
    border-radius:18px;
    box-shadow:0 6px 18px rgba(0,0,0,.08);
    display:block;
    background:#fff;
  }
</style>
</head>
<body>
  <div class="tabs" role="tablist" aria-label="Select a PDP">
    <button class="tab" role="tab" aria-selected="true"  data-src="Aqualogica%20PDP%20Wireframe.html">Sunscreen</button>
    <button class="tab" role="tab" aria-selected="false" data-src="Aqualogica%20Mist%20PDP.html">Fragrance</button>
    <button class="tab" role="tab" aria-selected="false" data-src="Aqualogica%20Combo%20PDP.html">Combo Gift Set</button>
    <button class="tab" role="tab" aria-selected="false" data-src="Aqualogica%20Tinted%20Sun%20Serum%20PDP.html">Tinted Sun Serum</button>
  </div>
  <div class="stage">
    <div class="variants show" id="variants">
      <button class="vbtn" data-src="Aqualogica%20PDP%20Wireframe.html" aria-selected="true">Variant 1 · Routine deck</button>
      <button class="vbtn" data-src="Aqualogica%20PDP%20Wireframe%20v2.html" aria-selected="false">Variant 2 · Story reel</button>
      <button class="vbtn" data-src="Aqualogica%20PDP%20Wireframe%20v3.html" aria-selected="false">Variant 3 · Shop the look</button>
    </div>
    <iframe id="frame" title="Selected PDP" src="Aqualogica%20PDP%20Wireframe.html"></iframe>
  </div>
  <script>
    var tabs=document.querySelectorAll('.tab'),frame=document.getElementById('frame');
    var variants=document.getElementById('variants'),vbtns=variants.querySelectorAll('.vbtn');
    var SUN='Aqualogica%20PDP%20Wireframe.html';
    tabs.forEach(function(t){
      t.addEventListener('click',function(){
        tabs.forEach(function(x){x.setAttribute('aria-selected','false');});
        t.setAttribute('aria-selected','true');
        var isSun=t.dataset.src===SUN;
        variants.classList.toggle('show',isSun);
        if(isSun){
          vbtns.forEach(function(v,i){v.setAttribute('aria-selected',i===0?'true':'false');});
          frame.src=vbtns[0].dataset.src;
        }else{
          frame.src=t.dataset.src;
        }
      });
    });
    vbtns.forEach(function(v){
      v.addEventListener('click',function(){
        vbtns.forEach(function(x){x.setAttribute('aria-selected','false');});
        v.setAttribute('aria-selected','true');
        frame.src=v.dataset.src;
      });
    });
  </script>
</body>
</html>
